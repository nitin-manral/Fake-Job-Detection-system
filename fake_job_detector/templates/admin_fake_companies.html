{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mb-3"><i class="fas fa-arrow-left"></i> Back</a>
    <h2>Manage Fake Companies</h2>
    
    <div class="card mt-4">
        <div class="card-body">
            <h5>Add New Fake Company</h5>
            <form method="POST" action="{{ url_for('add_fake_company') }}">
                <div class="mb-3">
                    <label class="form-label">Company Name</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Scam Type</label>
                    <input type="text" class="form-control" name="scam_type" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">How Scam Works</label>
                    <textarea class="form-control" name="how_scam_works" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Add Company</button>
            </form>
        </div>
    </div>

    <div class="table-responsive mt-4">
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Scam Type</th>
                    <th>Complaints</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for company in companies %}
                <tr>
                    <td>{{ company.name }}</td>
                    <td>{{ company.scam_type }}</td>
                    <td>{{ company.complaint_count }}</td>
                    <td><a href="{{ url_for('delete_fake_company', id=company.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this company?')">Delete</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
