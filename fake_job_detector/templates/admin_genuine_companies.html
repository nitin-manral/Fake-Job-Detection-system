{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mb-3"><i class="fas fa-arrow-left"></i> Back</a>
    <h2>Manage Genuine Companies</h2>
    
    <div class="card mt-4">
        <div class="card-body">
            <h5>Add New Genuine Company</h5>
            <form method="POST" action="{{ url_for('add_genuine_company') }}">
                <div class="mb-3">
                    <label class="form-label">Company Name</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Website</label>
                    <input type="text" class="form-control" name="website" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Overview</label>
                    <textarea class="form-control" name="overview" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Hiring Process</label>
                    <textarea class="form-control" name="hiring_process" rows="2" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Eligibility</label>
                    <textarea class="form-control" name="eligibility" rows="2" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Safety Tips</label>
                    <textarea class="form-control" name="safety_tips" rows="2" required></textarea>
                </div>
                <button type="submit" class="btn btn-success">Add Company</button>
            </form>
        </div>
    </div>

    <div class="table-responsive mt-4">
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Website</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for company in companies %}
                <tr>
                    <td>{{ company.name }}</td>
                    <td>{{ company.website }}</td>
                    <td><a href="{{ url_for('delete_genuine_company', id=company.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this company?')">Delete</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
