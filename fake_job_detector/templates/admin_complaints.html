{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mb-3"><i class="fas fa-arrow-left"></i> Back</a>
    <h2>User Complaints</h2>
    
    <div class="table-responsive mt-4">
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Company</th>
                    <th>Complaint</th>
                </tr>
            </thead>
            <tbody>
                {% for complaint in complaints %}
                <tr>
                    <td>{{ complaint.timestamp.strftime('%Y-%m-%d %H:%M') }}</td>
                    <td>{{ complaint.company_name }}</td>
                    <td>{{ complaint.complaint_text }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
