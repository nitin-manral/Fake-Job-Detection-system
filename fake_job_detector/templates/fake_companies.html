{% extends "base.html" %}

{% block content %}
<div class="container mt-5 mb-5">
    <h2 class="mb-4"><i class="fas fa-exclamation-triangle"></i> Fake Company Database</h2>
    
    <div class="card p-4 mb-4">
        <form method="GET" class="row g-3">
            <div class="col-md-4">
                <input type="text" class="form-control" name="search" placeholder="Search company..." value="{{ search }}">
            </div>
            <div class="col-md-3">
                <select class="form-select" name="type" style="color: #fff;">
                    <option value="" style="background: #0f0f23;">All Scam Types</option>
                    {% for st in scam_types %}
                    <option value="{{ st[0] }}" {{ 'selected' if scam_type == st[0] else '' }} style="background: #0f0f23; color: #fff;">{{ st[0] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" name="sort">
                    <option value="complaints" {{ 'selected' if sort == 'complaints' else '' }}>Most Complaints</option>
                    <option value="name" {{ 'selected' if sort == 'name' else '' }}>Name A-Z</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" type="submit"><i class="fas fa-search"></i> Filter</button>
            </div>
        </form>
    </div>

    <div class="row">
        {% for company in companies %}
        <div class="col-md-6 mb-3">
            <div class="card company-card">
                <div class="card-body">
                    <h5>{{ company.name }}</h5>
                    <p><strong>Scam Type:</strong> <span class="badge" style="background: var(--danger);">{{ company.scam_type }}</span></p>
                    <p><strong>Complaints:</strong> <span class="badge bg-danger">{{ company.complaint_count }}</span></p>
                    <a href="{{ url_for('fake_company_detail', id=company.id) }}" class="btn btn-sm btn-outline-primary">View Details</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="card mt-5 p-4">
        <h5 style="color: var(--danger);"><i class="fas fa-flag"></i> Submit a Complaint</h5>
        <form method="POST" action="{{ url_for('submit_complaint') }}" class="mt-3">
            <div class="mb-3">
                <label class="form-label">Company Name</label>
                <input type="text" class="form-control" name="company_name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Complaint Details</label>
                <textarea class="form-control" name="complaint_text" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit Complaint</button>
        </form>
    </div>
</div>
{% endblock %}
