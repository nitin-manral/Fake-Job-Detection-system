{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center">
        <h2><i class="fas fa-user-shield"></i> Admin Dashboard</h2>
        <a href="{{ url_for('admin_logout') }}" class="btn btn-danger">Logout</a>
    </div>
    
    <div class="row mt-4">
        <div class="col-md-3 mb-3">
            <div class="stat-card">
                <h3>{{ total_scans }}</h3>
                <p>Total Scans</p>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="stat-card">
                <h3>{{ total_fake }}</h3>
                <p>Fake Companies</p>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="stat-card">
                <h3>{{ total_genuine }}</h3>
                <p>Genuine Companies</p>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="stat-card">
                <h3>{{ total_complaints }}</h3>
                <p>Complaints</p>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-4 mb-3">
            <a href="{{ url_for('admin_fake_companies') }}" class="btn btn-lg btn-outline-primary w-100">
                <i class="fas fa-exclamation-triangle"></i> Manage Fake Companies
            </a>
        </div>
        <div class="col-md-4 mb-3">
            <a href="{{ url_for('admin_genuine_companies') }}" class="btn btn-lg btn-outline-success w-100">
                <i class="fas fa-check-circle"></i> Manage Genuine Companies
            </a>
        </div>
        <div class="col-md-4 mb-3">
            <a href="{{ url_for('admin_complaints') }}" class="btn btn-lg btn-outline-warning w-100">
                <i class="fas fa-comments"></i> View Complaints
            </a>
        </div>
    </div>
</div>
{% endblock %}
